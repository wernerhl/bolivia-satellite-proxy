# Sentinel-5P TROPOMI NO2 ROIs — rectangles in WGS84.
# 11 ROIs total: 3 originals (large, multi-pixel) + 8 secondary cities
# (smaller, some sub-pixel). For the 8 new ROIs the rectangle is
# centered on the city centroid with the side length given.
# TROPOMI native cell is ~5.5 × 3.5 km (≈ 0.05° × 0.03°), so any ROI
# narrower than that is sub-pixel — we still extract a value via
# reduceRegion's mean reducer; n_native_pixels in the output reports
# how many native cells the ROI covers.
rois:
  - name: la_paz_el_alto
    label: "La Paz–El Alto"
    nw_lat: -16.350
    nw_lon: -68.300
    se_lat: -16.650
    se_lon: -68.000
  - name: santa_cruz
    label: "Santa Cruz"
    nw_lat: -17.600
    nw_lon: -63.400
    se_lat: -17.950
    se_lon: -62.950
  - name: cochabamba
    label: "Cochabamba"
    nw_lat: -17.300
    nw_lon: -66.300
    se_lat: -17.500
    se_lon: -66.050
  - name: sucre
    label: "Sucre"
    nw_lat: -18.997   # -19.033 + 0.072/2
    nw_lon: -65.299   # -65.263 - 0.072/2
    se_lat: -19.069   # -19.033 - 0.072/2
    se_lon: -65.227   # -65.263 + 0.072/2
  - name: oruro
    label: "Oruro"
